# ── Project Paths ──────────────────────────────────────────
paths:
  raw_physionet: "data/raw/physionet"
  raw_icbhi: "data/raw/icbhi"
  processed: "data/processed"
  mixed: "data/mixed"
  experiments: "experiments"

# ── Audio Preprocessing ────────────────────────────────────
audio:
  sample_rate: 4000        # Hz — captures all heart/lung frequency content
  segment_length: 3.0      # seconds — covers ~2-3 heart cycles at 60-80 BPM
  overlap: 1.0             # seconds overlap — increases dataset size
  n_fft: 512
  hop_length: 128
  n_mels: 64

# ── Mixing Strategy ────────────────────────────────────────
mixing:
  snr_min_db: -5
  snr_max_db: 5

# ── Training ───────────────────────────────────────────────
training:
  batch_size: 16
  num_epochs: 100
  learning_rate: 0.001
  val_split: 0.15
  test_split: 0.15
  seed: 42

# ── Model ──────────────────────────────────────────────────
model:
  name: "vae"
  latent_dim: 128